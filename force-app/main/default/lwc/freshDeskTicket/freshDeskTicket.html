<template>
<lightning-card  variant="Narrow"  title="FreshDesk Ticket" icon-name="standard:case">

    <lightning-spinner  lwc:if= {isLoading} alternative-text="Creating Ticket in FreshDesk" size="small" variant="brand"></lightning-spinner>

    <div class="slds-p-horizontal_small">
        <lightning-input type="text" variant="standard" name="ContactName" label="Contact Name" required onchange={changeHandler} ></lightning-input>
        <lightning-input type="email" variant="standard" name="ContactEmail" label="Contact Email" required onchange={changeHandler} ></lightning-input>

        <lightning-input type="text" variant="standard" name="Subject" label="Subject" onchange={changeHandler} required></lightning-input>
        <lightning-textarea type="email" variant="standard" name="Description" label="Description" onchange={changeHandler} required ></lightning-textarea>

        <lightning-combobox
            name="Typex"
            label="Type"
            placeholder="Select Type"
            options={typeOptions}
            onchange={changeHandler}
            required>
        </lightning-combobox>

        <lightning-combobox
            name="Status"
            label="Status"
            placeholder="Select Status"
            options={statusOptions}
            onchange={changeHandler}
            required>
        </lightning-combobox>

        <lightning-combobox
            name="Source"
            label="Source"
            placeholder="Select Source"
            options={sourceOptions}
            onchange={changeHandler}
            required>
        </lightning-combobox>

         <lightning-combobox
            name="Priority"
            label="Priority"
            placeholder="Select Priority"
            options={priorityOptions}
            onchange={changeHandler}
            required>
        </lightning-combobox>
    </div>

    <div class="slds-m-around_small">
        <lightning-button variant="brand" label="Create Case" title="Create Case" onclick={handleClick}></lightning-button>
    </div>
</lightning-card>
</template>
